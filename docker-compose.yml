services:
  wiiu-installer:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    container_name: ${CONTAINER_NAME:-wiiu-usb-rocket}
    privileged: true
    restart: unless-stopped
    ports:
      - "${APP_PORT:-18080}:8080"
    environment:
      WIIU_DISK: ${WIIU_DISK:-}
      WIIU_COMMON_KEY: ${WIIU_COMMON_KEY:-}
      ALLOW_FALLBACK: ${ALLOW_FALLBACK:-true}
      WFS_BACKEND: ${WFS_BACKEND:-native}
      DRY_RUN: ${DRY_RUN:-false}
      FIRST_WRITE_CONFIRMED: ${FIRST_WRITE_CONFIRMED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      DB_URL: sqlite:////data/app.db
    volumes:
      - ./keys:/keys:ro
      - ./data:/data
      - ./logs:/logs
      - /dev:/dev
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/readyz', timeout=2).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
